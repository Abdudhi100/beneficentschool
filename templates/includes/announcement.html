{% if announcement %}
<div class="bg-blue-900 text-white text-sm py-2 px-4 text-center">
    <p>
        {{ announcement.message }}
        {% if announcement.link %}
            <a href="{{ announcement.link }}" class="underline font-semibold ml-2 hover:text-blue-200">Learn more</a>
        {% endif %}
    </p>
</div>
{% endif %}
