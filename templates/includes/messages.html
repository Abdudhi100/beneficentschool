{% if messages %}
  <div class="fixed top-24 right-4 z-50 space-y-4 max-w-sm w-full" aria-live="polite">
    {% for message in messages %}
      <div x-data="{ show: true }" x-show="show" x-transition.opacity.duration.300ms class="bg-white border-l-4 rounded-lg shadow-xl p-4 flex items-start justify-between {% if message.tags == 'error' %}border-red-500 text-red-700{% elif message.tags == 'success' %}border-green-500 text-green-700{% elif message.tags == 'warning' %}border-yellow-500 text-yellow-700{% else %}border-blue-500 text-blue-700{% endif %}">
        <div class="mr-3">
            <p class="text-sm font-semibold">{{ message }}</p>
        </div>
        <button @click="show = false" class="text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-300 rounded p-1 transition-colors">
            <span class="sr-only">Dismiss</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
