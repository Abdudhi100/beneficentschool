<header class="bg-white/90 backdrop-blur-md shadow-sm border-b border-gray-100/50 sticky top-0 z-50 transition-colors" x-data="{ mobileMenuOpen: false }">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <div class="flex-shrink-0 flex items-center">
        <a href="{% url 'core:home' %}" class="flex items-center gap-3 group">
          {% if site_settings and site_settings.logo %}
            <img class="h-12 w-auto" src="{{ site_settings.logo.url }}" alt="{{ site_name }}">
          {% else %}
            <div class="h-10 w-10 bg-blue-900 text-white rounded-lg flex items-center justify-center font-bold text-xl group-hover:bg-blue-800 transition-colors">
              B
            </div>
            <span class="font-extrabold text-2xl text-blue-900 tracking-tight group-hover:text-blue-800 transition-colors">
              {{ site_name }}
            </span>
          {% endif %}
        </a>
      </div>

      <nav class="hidden md:flex items-center space-x-8">
        <a href="{% url 'core:home' %}" class="text-blue-900 inline-flex items-center px-1 border-b-2 border-blue-600 font-semibold">Home</a>
        <a href="{% url 'core:about' %}" class="text-gray-600 hover:text-blue-900 inline-flex items-center px-1 border-b-2 border-transparent hover:border-blue-300 font-medium transition-colors">About</a>
        <a href="{% url 'academics:index' %}" class="text-gray-600 hover:text-blue-900 inline-flex items-center px-1 border-b-2 border-transparent hover:border-blue-300 font-medium transition-colors">Our Schools</a>
        <a href="{% url 'academics:index' %}" class="text-gray-600 hover:text-blue-900 inline-flex items-center px-1 border-b-2 border-transparent hover:border-blue-300 font-medium transition-colors">Academics</a>
        <a href="{% url 'core:faq' %}" class="text-gray-600 hover:text-blue-900 inline-flex items-center px-1 border-b-2 border-transparent hover:border-blue-300 font-medium transition-colors">FAQ</a>
        <a href="{% url 'core:contact' %}" class="text-gray-600 hover:text-blue-900 inline-flex items-center px-1 border-b-2 border-transparent hover:border-blue-300 font-medium transition-colors">Contact</a>
      </nav>

      <div class="hidden md:flex items-center gap-3">
        <a href="{% url 'admissions:index' %}" class="border border-blue-900 text-blue-900 px-5 py-2.5 rounded-md font-semibold hover:bg-blue-50 transition-colors">
          Admission Info
        </a>
        <a href="{% url 'admissions:index' %}" class="bg-blue-900 text-white px-5 py-2.5 rounded-md font-semibold hover:bg-blue-800 transition-colors shadow shadow-blue-900/20">
          Apply Now
        </a>
      </div>

      <div class="flex items-center md:hidden">
        <button @click="mobileMenuOpen = !mobileMenuOpen" type="button" class="text-gray-600 hover:text-blue-900 focus:outline-none p-2" :aria-expanded="mobileMenuOpen.toString()">
          <span class="sr-only">Open main menu</span>
          <svg x-show="!mobileMenuOpen" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg x-show="mobileMenuOpen" style="display: none;" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div x-show="mobileMenuOpen" style="display: none;"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-2"
       class="md:hidden bg-white border-b border-gray-100 absolute w-full shadow-lg">
    <div class="px-2 pt-2 pb-6 space-y-1 sm:px-3">
      <a href="{% url 'core:home' %}" class="text-blue-900 block px-3 py-2 rounded-md font-semibold bg-gray-50">Home</a>
      <a href="{% url 'core:about' %}" class="text-gray-600 hover:text-blue-900 hover:bg-gray-50 block px-3 py-2 rounded-md font-medium transition-colors">About</a>
      <a href="{% url 'academics:index' %}" class="text-gray-600 hover:text-blue-900 hover:bg-gray-50 block px-3 py-2 rounded-md font-medium transition-colors">Our Schools</a>
      <a href="{% url 'academics:index' %}" class="text-gray-600 hover:text-blue-900 hover:bg-gray-50 block px-3 py-2 rounded-md font-medium transition-colors">Academics</a>
      <a href="{% url 'core:faq' %}" class="text-gray-600 hover:text-blue-900 hover:bg-gray-50 block px-3 py-2 rounded-md font-medium transition-colors">FAQ</a>
      <a href="{% url 'core:contact' %}" class="text-gray-600 hover:text-blue-900 hover:bg-gray-50 block px-3 py-2 rounded-md font-medium transition-colors">Contact</a>

      <div class="mt-4 px-3">
        <a href="{% url 'admissions:index' %}" class="w-full text-center bg-blue-900 text-white px-5 py-3 rounded-md font-semibold hover:bg-blue-800 transition-colors block shadow-md">
          Apply Now
        </a>
      </div>
    </div>
  </div>
</header>
